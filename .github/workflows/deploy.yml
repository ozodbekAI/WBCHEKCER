name: Deploy to VPS Server on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: ${{ contains(github.event.head_commit.message, '[deploy]') }}
    runs-on: ubuntu-latest

    env:
      USER: root
      SERVER_IP: 195.133.66.192
      SERVER_DIR: /var/www/WBCHEKCER

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} "mkdir -p ${{ env.SERVER_DIR }}"
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.git/' \
            --exclude 'venv/' \
            --exclude 'media/' \
            --exclude 'logs/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/dist/' \
            --exclude 'frontend/.env' \
            --exclude 'reports/' \
            --exclude 'wb_optimizer.db' \
            --exclude 'sku_cost_test_store4.xlsx' \
            --exclude 'frontend/fr.zip' \
            ./ ${{ env.USER }}@${{ env.SERVER_IP }}:${{ env.SERVER_DIR }}/

      - name: Backend - install deps, migrate & restart
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} 'bash -s' << 'SSHEOF'
            set -e
            cd /var/www/WBCHEKCER

            echo ">>> [1/4] Venv tekshirilmoqda..."
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            echo ">>> [2/4] pip install..."
            ./venv/bin/pip install --upgrade pip -q
            ./venv/bin/pip install -r requirements.txt -q

            echo ">>> [3/4] Alembic migrate..."
            ./venv/bin/alembic upgrade head || echo "⚠ Alembic xato, lekin deploy davom etmoqda"

            echo ">>> [4/4] Service restart..."
            systemctl restart wb-optimizer
            sleep 3
            systemctl is-active wb-optimizer && echo "✅ Backend ishga tushdi" || (journalctl -u wb-optimizer -n 20 --no-pager && exit 1)
          SSHEOF

      - name: Frontend - build & serve
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} 'bash -s' << 'SSHEOF'
            set -e
            cd /var/www/WBCHEKCER/frontend

            if [ ! -f "package.json" ]; then
              echo "Frontend yo'q, o'tkazib yuborildi"
              exit 0
            fi

            echo ">>> [FRONTEND] npm install..."
            if [ -f "package-lock.json" ]; then
              npm ci --silent
            else
              npm install --silent
            fi

            echo ">>> [FRONTEND] npm run build..."
            npm run build
            echo "✅ Frontend build tayyor"
          SSHEOF

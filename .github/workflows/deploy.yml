name: Deploy to VPS Server on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: ${{ contains(github.event.head_commit.message, '[deploy]') }}
    runs-on: ubuntu-latest

    env:
      USER: root
      SERVER_IP: 195.133.66.192
      AVEOTVET_DIR: /var/www/aveotvet
      WB_OPTIMIZER_DIR: /var/www/WBCHEKCER

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} "mkdir -p ${{ env.WB_OPTIMIZER_DIR }}"
          
          # Copy app/worker files (used by AVEOTVET backend)
          scp -r app/worker/ ${{ env.USER }}@${{ env.SERVER_IP }}:${{ env.AVEOTVET_DIR }}/backend/app/
          
          # Copy AVEOTVET UI files
          if [ -d "aveotvet/frontend" ]; then
            scp -r aveotvet/frontend/ ${{ env.USER }}@${{ env.SERVER_IP }}:${{ env.AVEOTVET_DIR }}/frontend/
          fi

      - name: AVEOTVET Backend - restart worker with new tasks.py
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} 'bash -s' << 'SSHEOF'
            set -e
            echo ">>> [AVEOTVET] Worker service restarting..."
            systemctl restart aveotvet-worker.service
            sleep 2
            systemctl is-active aveotvet-worker.service && echo "✅ AVEOTVET Worker ishga tushdi" || (journalctl -u aveotvet-worker.service -n 20 --no-pager && exit 1)
          SSHEOF

      - name: AVEOTVET Frontend - build & restart
        run: |
          ssh ${{ env.USER }}@${{ env.SERVER_IP }} 'bash -s' << 'SSHEOF'
            set -e
            cd /var/www/aveotvet/frontend

            if [ ! -f "package.json" ]; then
              echo "AVEOTVET Frontend yo'q, o'tkazib yuborildi"
              exit 0
            fi

            echo ">>> [AVEOTVET FRONTEND] npm install..."
            if [ -f "package-lock.json" ]; then
              npm ci --silent
            else
              npm install --silent
            fi

            echo ">>> [AVEOTVET FRONTEND] npm run build..."
            npm run build

            echo ">>> [AVEOTVET] Web service restarting..."
            systemctl restart aveotvet
            sleep 2
            systemctl is-active aveotvet && echo "✅ AVEOTVET ishga tushdi" || (journalctl -u aveotvet -n 20 --no-pager && exit 1)
          SSHEOF
